name: Deploy to Server

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Deploy to server via SSH
      run: |
        PAYLOAD='{"ref":"main"}'
        SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "16244d787f3c0a42917feb0b5cd008ea878e65d4d0472007b0e9f4bc327c0c78" | sed 's/^.* //')
        curl -X POST http://cargonovo-bot.duckdns.org:5000/deploy \
          -H "Content-Type: application/json" \
          -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
          -d "$PAYLOAD"
    
    - name: Notify on success
      if: success()
      run: |
        echo "вњ… Deployment successful!"
    
    - name: Notify on failure
      if: failure()
      run: |
        echo "вќЊ Deployment failed!"
